title: WeOS Documentation
description: "Open source digital twin and knowledge graph for LLMs — developer documentation"
url: "https://wepala.github.io"
baseurl: "/weos"

theme: just-the-docs

permalink: pretty

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

search_enabled: true
search.heading_level: 3

aux_links:
  "GitHub": "https://github.com/wepala/weos"
aux_links_new_tab: true

footer_content: "WeOS is open source under AGPL-3.0. Built by Wepala."

back_to_top: true
back_to_top_text: "Back to top"

just_the_docs:
  collections:
    tutorials:
      name: Tutorials
      nav_fold: false
    howto:
      name: How-to Guides
      nav_fold: false
    explanation:
      name: Explanation
      nav_fold: false
    reference:
      name: Reference
      nav_fold: false

collections:
  tutorials:
    output: true
    permalink: /:collection/:path/
  howto:
    output: true
    permalink: /:collection/:path/
  explanation:
    output: true
    permalink: /:collection/:path/
  reference:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: "tutorials"
    values:
      layout: default
  - scope:
      path: ""
      type: "howto"
    values:
      layout: default
  - scope:
      path: ""
      type: "explanation"
    values:
      layout: default
  - scope:
      path: ""
      type: "reference"
    values:
      layout: default
