openapi: 3.0.3
info:
  title: Blog with MCP
  description: Blog API example with MCP capabilities
  version: 1.0.0
servers:
  - url: https://prod1.weos.sh/blog/dev
    description: WeOS Dev
  - url: https://prod1.weos.sh/blog/v1
x-weos-config:
  database:
    driver: sqlite3
    database: test.db
  rest:
    middleware:
      - RequestID
      - Recover
      - ZapLogger
  x-mcp:
    withTools: true
components:
  schemas:
    Category:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
      required:
        - title
      x-identifier:
        - title
    Author:
      type: object
      properties:
        id:
          type: string
          format: ksuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
      required:
        - firstName
        - lastName
      x-identifier:
        - id
        - email
    Blog:
      x-rdf-type: "http://schema.org/Blog"
      type: object
      properties:
        url:
          type: string
          format: uri
          x-unique: true
        title:
          type: string
        description:
          type: string
          nullable: true
        author:
          $ref: "#/components/schemas/Author"
        cost:
          type: number
          format: double
          nullable: true
        status:
          type: string
          nullable: true
          enum:
            - "null"
            - unpublished
            - published
        date:
          type: string
          nullable: true
          format: date-time
        image:
          type: string
          format: byte
          nullable: true
        categories:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Category"
        posts:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Post"
        lastUpdated:
          type: string
          format: date-time
          nullable: true
          x-update:
            - Add Blog
            - Update Blog
        created:
          type: string
          format: date-time
          nullable: true
          x-update:
            - Add Blog
      required:
        - title
        - url
    Post:
      type: object
      properties:
        id:
          type: string
          format: ksuid
        title:
          type: string
        content:
          type: string
          nullable: true
        author:
          $ref: "#/components/schemas/Author"
        created:
          type: string
          format: date-time
      required:
        - title
      x-identifier:
        - id
paths:
  /blogs:
    get:
      operationId: ListBlogs
      summary: List all blogs
      description: Returns a list of all blogs
      x-mcp:
        name: listBlogs
        description: List all available blogs
      responses:
        '200':
          description: A list of blogs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Blog"
    post:
      operationId: CreateBlog
      summary: Create a new blog
      description: Creates a new blog with the provided information
      x-mcp:
        name: createBlog
        description: Create a new blog with the provided details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Blog"
      responses:
        '201':
          description: Blog created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
        '400':
          description: Invalid input

  /blogs/{blogUrl}:
    get:
      operationId: GetBlog
      summary: Get a blog by URL
      description: Returns a specific blog identified by its URL
      x-mcp:
        name: getBlog
        description: Retrieve a blog by its URL
      parameters:
        - name: blogUrl
          in: path
          required: true
          schema:
            type: string
          description: URL of the blog to retrieve
      responses:
        '200':
          description: A blog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
        '404':
          description: Blog not found
    put:
      operationId: UpdateBlog
      summary: Update a blog
      description: Updates an existing blog
      x-mcp:
        name: updateBlog
        description: Update an existing blog's information
      parameters:
        - name: blogUrl
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Blog"
      responses:
        '200':
          description: Blog updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
        '404':
          description: Blog not found
    delete:
      operationId: DeleteBlog
      summary: Delete a blog
      description: Deletes an existing blog
      x-mcp:
        name: deleteBlog
        description: Delete an existing blog
      parameters:
        - name: blogUrl
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Blog deleted successfully
        '404':
          description: Blog not found

  /blogs/{blogUrl}/posts:
    get:
      operationId: ListBlogPosts
      summary: List all posts for a blog
      description: Returns a list of all posts for a specific blog
      x-mcp:
        description: List all posts for a specific blog
      parameters:
        - name: blogUrl
          in: path
          required: true
          schema:
            type: string
          description: URL of the blog
      responses:
        '200':
          description: A list of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
        '404':
          description: Blog not found
    post:
      operationId: CreatePost
      summary: Create a new post
      description: Creates a new post for a specific blog
      x-mcp:
        name: createBlogPost
        description: Create a new post for a specific blog
      parameters:
        - name: blogUrl
          in: path
          required: true
          schema:
            type: string
          description: URL of the blog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Post"
      responses:
        '201':
          description: Post created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        '400':
          description: Invalid input
        '404':
          description: Blog not found

  /blogs/{blogUrl}/posts/{postId}:
    get:
      operationId: GetPost
      summary: Get a post
      description: Returns a specific post from a blog
      x-mcp:
        name: getBlogPost
        description: Retrieve a specific post from a blog
      parameters:
        - name: blogUrl
          in: path
          required: true
          schema:
            type: string
          description: URL of the blog
        - name: postId
          in: path
          required: true
          schema:
            type: string
          description: ID of the post
      responses:
        '200':
          description: A post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        '404':
          description: Post not found
    put:
      operationId: UpdatePost
      summary: Update a post
      description: Updates an existing post
      x-mcp:
        name: updateBlogPost
        description: Update an existing post in a blog
      parameters:
        - name: blogUrl
          in: path
          required: true
          schema:
            type: string
          description: URL of the blog
        - name: postId
          in: path
          required: true
          schema:
            type: string
          description: ID of the post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Post"
      responses:
        '200':
          description: Post updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        '404':
          description: Post not found
    delete:
      operationId: DeletePost
      summary: Delete a post
      description: Deletes an existing post
      x-mcp:
        name: deleteBlogPost
        description: Delete a post from a blog
      parameters:
        - name: blogUrl
          in: path
          required: true
          schema:
            type: string
          description: URL of the blog
        - name: postId
          in: path
          required: true
          schema:
            type: string
          description: ID of the post
      responses:
        '204':
          description: Post deleted successfully
        '404':
          description: Post not found
