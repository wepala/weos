openapi: 3.1.0
x-weos-config:
  basePath: ${BASE_PATH}
  database:
    driver: ${DB_DRIVER}
    host: ${DB_HOST}
    database: ${DB_NAME}
    port: ${DB_PORT}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    aws-region: ${AWS_REGION}
    aws-iam: ${USE_IAM}
    max-open: 10
    max-idle: 3
    max-idle-time: 0
  log:
    level: debug
    name: finance-service
  mcp:
    withTools: true
info:
  title: WeOS Finance Service
  description: API for managing business finances
  version: 1.0.0
servers:
  - url: 'https://localhost:8691/local'
  - url: 'https://weosnonprod.weos.link/education/dev'
  - url: 'https://prod1.weos.sh/education/dev'
  - url: 'https://prod1.weos.sh/education/v1'
components:
  parameters:
    FilterParam:
      name: _filter
      in: query
      style: deepObject
      explode: true
      description: Filter for specific records using property and operator syntax (_filter[property][operator]=value)
      required: false
      schema:
        type: object
        additionalProperties:
          type: object
          properties:
            eq:
              type: string
            lt:
              type: string
            gt:
              type: string
            in:
              type: string
            contains:
              type: string
            startsWith:
              type: string
            endsWith:
              type: string
    CursorParam:
      name: cursor
      in: query
      description: Pagination cursor
      required: false
      schema:
        type: string
    IntegrationsParam:
      name: integrations
      in: query
      description: Integration systems to connect with
      required: false
      schema:
        type: array
        items:
          type: string
          enum: [ google, netsuite, quickbooks, square, shopify ]

  schemas:
    Error:
      type: object
      properties:
        message:
          type: string

    # Core Financial Entities
    Transaction:
      type: object
      description: Financial transaction record
      properties:
        id:
          type: string
          format: uuid
        transactionType:
          type: string
          description: Type of transaction (payment, refund, transfer, etc.)
        amount:
          type: number
          format: decimal
        currency:
          type: string
        transactionDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, completed, failed, voided]
        sourceSystem:
          type: string
          description: System where transaction originated (NetSuite, Shopify, Square, etc.)
        sourceId:
          type: string
          description: ID in the source system
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    Account:
      type: object
      description: Financial account
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        accountNumber:
          type: string
        accountType:
          type: string
          enum: [asset, liability, equity, revenue, expense]
        currentBalance:
          type: number
          format: decimal
        currency:
          type: string
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    Customer:
      type: object
      description: Customer information
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        customerType:
          type: string
        createdAt:
          type: string
          format: date-time
        externalId:
          type: string
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    Vendor:
      type: object
      description: Vendor or supplier information
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        vendorType:
          type: string
        createdAt:
          type: string
          format: date-time
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    Invoice:
      type: object
      description: Customer invoice
      properties:
        id:
          type: string
          format: uuid
        totalAmount:
          type: number
          format: decimal
        amountDue:
          type: number
          format: decimal
        dueDate:
          type: string
          format: date-time
        issueDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [draft, sent, partial, paid, overdue, void]
        invoiceNumber:
          type: string
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    Bill:
      type: object
      description: Vendor bill
      properties:
        id:
          type: string
          format: uuid
        totalAmount:
          type: number
          format: decimal
        amountDue:
          type: number
          format: decimal
        dueDate:
          type: string
          format: date-time
        receiptDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [draft, received, partial, paid, overdue, void]
        billNumber:
          type: string
        approvalStatus:
          type: string
          enum: [pending, approved, rejected]
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    Payment:
      type: object
      description: Payment transaction
      properties:
        id:
          type: string
          format: uuid
        paymentMethod:
          type: string
        amount:
          type: number
          format: decimal
        paymentDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, completed, failed, voided]
        referenceNumber:
          type: string
        processorId:
          type: string
          description: ID from payment processor
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    Payout:
      type: object
      description: Payout to vendors or merchants
      properties:
        id:
          type: string
          format: uuid
        amount:
          type: number
          format: decimal
        currency:
          type: string
        payoutDate:
          type: string
          format: date-time
        destinationType:
          type: string
          enum: [bank_account, card, wallet]
        status:
          type: string
          enum: [pending, in_transit, completed, failed, canceled]
        externalReference:
          type: string
        processorId:
          type: string
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    Refund:
      type: object
      description: Payment refund
      properties:
        id:
          type: string
          format: uuid
        amount:
          type: number
          format: decimal
        reason:
          type: string
        refundDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, completed, failed, canceled]
        refundMethod:
          type: string
        processorId:
          type: string
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    Dispute:
      type: object
      description: Payment dispute or chargeback
      properties:
        id:
          type: string
          format: uuid
        amount:
          type: number
          format: decimal
        reason:
          type: string
        disputeDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [opened, under_review, won, lost, withdrawn]
        resolution:
          type: string
        resolvedDate:
          type: string
          format: date-time
        caseNumber:
          type: string
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    # Classification Entities
    Department:
      type: object
      description: Business department for financial categorization
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        description:
          type: string
        active:
          type: boolean
        parentDepartmentId:
          type: string
          format: uuid
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    Class:
      type: object
      description: Financial classification dimension
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        description:
          type: string
        active:
          type: boolean
        parentClassId:
          type: string
          format: uuid
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    # Financial Reporting Entities
    BalanceSheet:
      type: object
      description: Point-in-time financial position report
      properties:
        id:
          type: string
          format: uuid
        totalAssets:
          type: number
          format: decimal
        totalLiabilities:
          type: number
          format: decimal
        totalEquity:
          type: number
          format: decimal
        netWorth:
          type: number
          format: decimal
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        published:
          type: boolean
        status:
          type: string
          enum: [draft, published, archived]
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    IncomeStatement:
      type: object
      description: Financial performance report for a period
      properties:
        id:
          type: string
          format: uuid
        totalRevenue:
          type: number
          format: decimal
        totalExpenses:
          type: number
          format: decimal
        netIncome:
          type: number
          format: decimal
        grossProfit:
          type: number
          format: decimal
        operatingIncome:
          type: number
          format: decimal
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        published:
          type: boolean
        status:
          type: string
          enum: [draft, published, archived]
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    ReportLine:
      type: object
      description: Line item in a financial report
      properties:
        id:
          type: string
          format: uuid
        reportId:
          type: string
          format: uuid
        ledgerLineId:
          type: string
          format: uuid
        amount:
          type: number
          format: decimal
        lineType:
          type: string
        sequence:
          type: integer
        description:
          type: string
        parentLineId:
          type: string
          format: uuid
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    ReportSection:
      type: object
      description: Section grouping in a financial report
      properties:
        id:
          type: string
          format: uuid
        reportId:
          type: string
          format: uuid
        name:
          type: string
        sectionType:
          type: string
        sequence:
          type: integer
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    # Product and Inventory Entities
    Product:
      type: object
      description: Product or service offered
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        sku:
          type: string
        price:
          type: number
          format: decimal
        cost:
          type: number
          format: decimal
        stockQuantity:
          type: integer
        productType:
          type: string
          enum: [physical, digital, service]
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    ProductVariant:
      type: object
      description: Specific variant of a product (size, color, etc.)
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        title:
          type: string
        sku:
          type: string
        price:
          type: number
          format: decimal
        compareAtPrice:
          type: number
          format: decimal
        taxable:
          type: boolean
        weight:
          type: number
          format: decimal
        weightUnit:
          type: string
          enum: [kg, lb, oz, g]
        inventoryQuantity:
          type: integer
        barcode:
          type: string
        imageUrl:
          type: string
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    ProductOption:
      type: object
      description: Option defining a product variant (size, color, etc.)
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        value:
          type: string
        position:
          type: integer
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    Inventory:
      type: object
      description: Inventory tracking information
      properties:
        id:
          type: string
          format: uuid
        quantity:
          type: integer
        averageCost:
          type: number
          format: decimal
        lastUpdated:
          type: string
          format: date-time
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    Location:
      type: object
      description: Physical location for inventory
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        address:
          type: string
        type:
          type: string
          enum: [store, warehouse, fulfillment_center, dropship]
        active:
          type: boolean
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    # Sales and Commerce Entities
    SalesOrder:
      type: object
      description: Customer sales order
      properties:
        id:
          type: string
          format: uuid
        totalAmount:
          type: number
          format: decimal
        tax:
          type: number
          format: decimal
        shipping:
          type: number
          format: decimal
        orderDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, processing, completed, cancelled]
        orderNumber:
          type: string
        platform:
          type: string
          description: Sales channel or platform (Shopify, Square, etc.)
        shippingMethod:
          type: string
        channel:
          type: string
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    PurchaseOrder:
      type: object
      description: Vendor purchase order
      properties:
        id:
          type: string
          format: uuid
        totalAmount:
          type: number
          format: decimal
        tax:
          type: number
          format: decimal
        shipping:
          type: number
          format: decimal
        orderDate:
          type: string
          format: date-time
        expectedReceiptDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [draft, submitted, partially_received, received, cancelled]
        poNumber:
          type: string
        approvalStatus:
          type: string
          enum: [pending, approved, rejected]
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    OrderItem:
      type: object
      description: Line item in an order
      properties:
        id:
          type: string
          format: uuid
        quantity:
          type: integer
        unitPrice:
          type: number
          format: decimal
        totalPrice:
          type: number
          format: decimal
        itemType:
          type: string
        taxAmount:
          type: number
          format: decimal
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    # Accounting Entities
    JournalEntry:
      type: object
      description: Accounting journal entry
      properties:
        id:
          type: string
          format: uuid
        reference:
          type: string
        entryDate:
          type: string
          format: date-time
        description:
          type: string
        posted:
          type: boolean
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    LedgerLine:
      type: object
      description: Line in a journal entry
      properties:
        id:
          type: string
          format: uuid
        debitAmount:
          type: number
          format: decimal
        creditAmount:
          type: number
          format: decimal
        description:
          type: string
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    TaxRate:
      type: object
      description: Tax rate information
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        rate:
          type: number
          format: decimal
        jurisdictionType:
          type: string
          enum: [country, state, county, city]
        active:
          type: boolean
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    FiscalPeriod:
      type: object
      description: Accounting period
      properties:
        id:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
          enum: [open, closed, locked]
        periodType:
          type: string
          enum: [month, quarter, year]
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    PaymentMethod:
      type: object
      description: Stored payment method
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [credit_card, bank_account, digital_wallet, other]
        provider:
          type: string
        accountLast4:
          type: string
        expiryDate:
          type: string
        isDefault:
          type: boolean
        created:
          type: string
          format: date-time
          description: Timestamp when the record was created
        updated:
          type: string
          format: date-time
          description: Timestamp when the record was last updated

    # Response Wrappers
    PaginatedResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
        nextCursor:
          type: string
          description: Cursor for retrieving the next page of results

    # Enhanced response schemas for detailed views
    TransactionDetail:
      allOf:
        - $ref: '#/components/schemas/Transaction'
        - type: object
          properties:
            relatedAccounts:
              type: array
              items:
                $ref: '#/components/schemas/Account'
            paymentDetails:
              $ref: '#/components/schemas/Payment'

    AccountDetail:
      allOf:
        - $ref: '#/components/schemas/Account'
        - type: object
          properties:
            transactions:
              type: array
              items:
                $ref: '#/components/schemas/Transaction'
            journalEntries:
              type: array
              items:
                $ref: '#/components/schemas/JournalEntry'

    CustomerDetail:
      allOf:
        - $ref: '#/components/schemas/Customer'
        - type: object
          properties:
            invoices:
              type: array
              items:
                $ref: '#/components/schemas/Invoice'
            payments:
              type: array
              items:
                $ref: '#/components/schemas/Payment'

    VendorDetail:
      allOf:
        - $ref: '#/components/schemas/Vendor'
        - type: object
          properties:
            bills:
              type: array
              items:
                $ref: '#/components/schemas/Bill'
            payouts:
              type: array
              items:
                $ref: '#/components/schemas/Payout'

    InvoiceDetail:
      allOf:
        - $ref: '#/components/schemas/Invoice'
        - type: object
          properties:
            customer:
              $ref: '#/components/schemas/Customer'
            payments:
              type: array
              items:
                $ref: '#/components/schemas/Payment'
            transactions:
              type: array
              items:
                $ref: '#/components/schemas/Transaction'

    BillDetail:
      allOf:
        - $ref: '#/components/schemas/Bill'
        - type: object
          properties:
            vendor:
              $ref: '#/components/schemas/Vendor'
            payouts:
              type: array
              items:
                $ref: '#/components/schemas/Payout'
            transactions:
              type: array
              items:
                $ref: '#/components/schemas/Transaction'

    PaymentDetail:
      allOf:
        - $ref: '#/components/schemas/Payment'
        - type: object
          properties:
            customer:
              $ref: '#/components/schemas/Customer'
            invoice:
              $ref: '#/components/schemas/Invoice'
            transaction:
              $ref: '#/components/schemas/Transaction'
            refunds:
              type: array
              items:
                $ref: '#/components/schemas/Refund'

    PayoutDetail:
      allOf:
        - $ref: '#/components/schemas/Payout'
        - type: object
          properties:
            vendor:
              $ref: '#/components/schemas/Vendor'
            bill:
              $ref: '#/components/schemas/Bill'
            transaction:
              $ref: '#/components/schemas/Transaction'

    RefundDetail:
      allOf:
        - $ref: '#/components/schemas/Refund'
        - type: object
          properties:
            payment:
              $ref: '#/components/schemas/Payment'
            transaction:
              $ref: '#/components/schemas/Transaction'

    DisputeDetail:
      allOf:
        - $ref: '#/components/schemas/Dispute'
        - type: object
          properties:
            payment:
              $ref: '#/components/schemas/Payment'
            transaction:
              $ref: '#/components/schemas/Transaction'

    JournalEntryDetail:
      allOf:
        - $ref: '#/components/schemas/JournalEntry'
        - type: object
          properties:
            ledgerLines:
              type: array
              items:
                $ref: '#/components/schemas/LedgerLine'
            accounts:
              type: array
              items:
                $ref: '#/components/schemas/Account'
            transaction:
              $ref: '#/components/schemas/Transaction'

    BalanceSheetDetail:
      allOf:
        - $ref: '#/components/schemas/BalanceSheet'
        - type: object
          properties:
            reportLines:
              type: array
              items:
                $ref: '#/components/schemas/ReportLine'
            reportSections:
              type: array
              items:
                $ref: '#/components/schemas/ReportSection'
            accounts:
              type: array
              items:
                $ref: '#/components/schemas/Account'

    IncomeStatementDetail:
      allOf:
        - $ref: '#/components/schemas/IncomeStatement'
        - type: object
          properties:
            reportLines:
              type: array
              items:
                $ref: '#/components/schemas/ReportLine'
            reportSections:
              type: array
              items:
                $ref: '#/components/schemas/ReportSection'
            accounts:
              type: array
              items:
                $ref: '#/components/schemas/Account'

    MessageResponse:
